name: drift-detection

# Scheduled drift-detection loop for the Purview-as-Code lab. Runs all
# reconcilers in read-only mode (-WhatIf) against the live
# target tenant (selected environment) and opens a GitHub issue when drift is
# detected between the repo's desired-state YAML and the live tenant.
#
# A read-only, issue-only drift-detection watch loop.
#
# Read-only contract: every tenant call is -WhatIf only. No deploy step
# exists. Per security principle #9 and mcp-tool-usage.instructions.md
# read-only default, this workflow never invokes the apply path of any
# Deploy-*.ps1 script. The issue is routed to @idea-intake via labels.
#
# Federated credential reuse: the gh-oidc-purview-data-plane app's
# federated credential is scoped to
# `repo:<org>/<repo>:environment:<environment>`
# (per ADR 0010). Because this job declares the selected `environment:`
# (ADR 0057), no new
# federated credential subject is required for the schedule trigger.
#
# Key Vault access: the runner principal signs the IPPS client_assertion
# JWT via `az keyvault key sign` against the environment's automation Key Vault (vars.KEY_VAULT_NAME). The vault is
# private-network by default; the workflow temp-opens its public endpoint
# for the duration of the drift check and restores it via an
# `if: always()` step.
#
# Skip gate (ADR 0054, pilot): this schedule-triggered workflow fires on
# every un-onboarded template copy, including this repository itself, and
# unconditionally assumed a real Purview tenant was wired up. The
# `preflight` job below tests the onboarding signal (a non-empty
# secrets.AZURE_CLIENT_ID and vars.KEY_VAULT_NAME on the selected GitHub
# Environment) from inside a running job -- `secrets` is not available in
# ANY `if:` condition, only in env/run/with -- and emits a
# `configured` output. The `detect-drift` job below declares
# `needs: preflight` and `if: needs.preflight.outputs.configured ==
# 'true'` (`needs` IS available in a job-level `if:`), so an un-onboarded
# copy SKIPS this job cleanly instead of failing at azure/login. This also
# folds in the KEY_VAULT_NAME guard that previously threw, unreachable,
# at step 5 of this job.
#
# References (Microsoft Learn, GitHub Docs):
#   https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure-openid-connect
#   https://learn.microsoft.com/en-us/entra/workload-id/workload-identity-federation-create-trust
#   https://learn.microsoft.com/en-us/powershell/exchange/app-only-auth-powershell-v2
#   https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
#   https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#schedule
#   https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#context-availability
#   https://docs.github.com/en/actions/how-tos/deploy/configure-and-manage-deployments/manage-environments

on:
  schedule:
    # Weekly Monday at 02:00 UTC. Cron grammar:
    # https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#schedule
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: >-
          Target deployment environment (GitHub Environment name).
          Defaults to lab. Push/schedule runs map branch dev -> dev and
          every other branch -> lab (ADR 0057).
        type: choice
        options:
          - lab
          - dev
        default: lab
        required: false

permissions:
  id-token: write           # OIDC token for azure/login@v2.
  contents: read            # Checkout only; no writes.
  issues: write             # gh issue create when drift detected.

concurrency:
  group: drift-detection-${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight (ADR 0054 onboarding signal)
    runs-on: ubuntu-latest
    # Binds the SAME selected environment as detect-drift below (ADR 0057
    # canonical expression, byte-identical), so the secret and variable it
    # tests are the exact ones detect-drift would use.
    environment: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
    permissions:
      contents: read
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    env:
      # secrets/vars are legal in jobs.<job_id>.env (not in jobs.<job_id>.if
      # or jobs.<job_id>.steps.if) -- see ADR 0054.
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
    steps:
      - name: Check onboarding signal
        id: check
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:AZURE_CLIENT_ID)) {
            Write-Host "::notice::secrets.AZURE_CLIENT_ID is not set on this GitHub Environment. This copy is not onboarded to a Purview tenant (ADR 0054) -- skipping the tenant-touching job."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "configured=false"
          } elseif ([string]::IsNullOrEmpty($env:KEY_VAULT_NAME)) {
            Write-Host "::notice::vars.KEY_VAULT_NAME is not set on this GitHub Environment. This copy is not onboarded to a Purview tenant (ADR 0054) -- skipping the tenant-touching job."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "configured=false"
          } else {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "configured=true"
          }

  detect-drift:
    name: Detect drift
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}
      # Reconciler parameters-file override (ADR 0057): every
      # Deploy-*.ps1 / Export-*.ps1 honors PURVIEW_PARAMETERS_FILE when
      # -ParametersFile is not passed explicitly.
      PURVIEW_PARAMETERS_FILE: infra/parameters/${{ inputs.environment || (github.ref_name == 'dev' && 'dev' || 'lab') }}.yaml
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Install-Module powershell-yaml -Force -Scope CurrentUser
          Install-Module ExchangeOnlineManagement -Force -Scope CurrentUser
          Install-Module Microsoft.Graph.Identity.DirectoryManagement -Force -Scope CurrentUser

      - name: Temporarily allow Key Vault public access
        id: kv-open
        shell: pwsh
        run: |
          # KEY_VAULT_NAME is guaranteed non-empty here: the preflight job
          # (ADR 0054) already checked it and this job would have been
          # skipped, not started, if it were absent.
          az keyvault update `
            --name $env:KEY_VAULT_NAME `
            --public-network-access Enabled `
            --default-action Allow `
            --only-show-errors `
            -o none
          Add-Content -Path $env:GITHUB_OUTPUT -Value "opened=true"
          # Wait for the network rule change to propagate before the first
          # data-plane call (matches the local lab smoke recipe).
          Start-Sleep -Seconds 25

      - name: Run reconcilers in WhatIf mode
        id: reconcile
        shell: pwsh
        run: |
          # Discover all Deploy-*.ps1 reconcilers that support -WhatIf.
          # Exclude Deploy-Policies.ps1 (retired per ADR 0038).
          $reconcilers = Get-ChildItem -Path scripts/Deploy-*.ps1 -Exclude Deploy-Policies.ps1 | Where-Object {
            $content = Get-Content $_.FullName -Raw
            $content -match 'SupportsShouldProcess'
          }

          $driftDetected = $false
          $driftReport = @()

          foreach ($script in $reconcilers) {
            Write-Host "::group::Running $($script.Name) -WhatIf"
            $scriptName = $script.Name
            
            try {
              # Capture output and run with -WhatIf.
              $output = & $script.FullName -WhatIf 2>&1 | Out-String
              Write-Host $output
              
              # Parse for "Plan:" line indicating changes.
              # Standard reconciler output format: "Plan: X adds, Y updates, Z removes"
              if ($output -match 'Plan:\s+\d+\s+add|Plan:\s+\d+\s+update|Plan:\s+\d+\s+remove') {
                $planLine = ($output -split "`n" | Where-Object { $_ -match '^Plan:' }) -join '; '
                if ($planLine -and $planLine -notmatch 'Plan:\s+0\s+adds?,\s+0\s+updates?,\s+0\s+removes?') {
                  $driftDetected = $true
                  $driftReport += "- **$scriptName**: $planLine"
                  Write-Host "::warning::Drift detected in $scriptName"
                }
              }
            }
            catch {
              Write-Host "::error::$scriptName failed: $_"
              $driftReport += "- **$scriptName**: ❌ Failed: $_"
            }
            
            Write-Host "::endgroup::"
          }

          # Write drift status to output for the issue-creation step.
          if ($driftDetected) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "drift=true"
            # Write report to a temp file for the issue body.
            $reportText = $driftReport -join "`n"
            Set-Content -Path drift-report.txt -Value $reportText
            Write-Host "::notice::Drift detected. Issue will be opened."
          } else {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "drift=false"
            Write-Host "::notice::No drift detected."
          }

      - name: Check for existing drift issue
        if: steps.reconcile.outputs.drift == 'true'
        id: check-issue
        shell: pwsh
        run: |
          # Check if an open issue with squad:automation-engineer label already exists
          # to avoid creating duplicates.
          $existingIssue = gh issue list --label "squad:automation-engineer" --label "drift-detected" --state open --limit 1 --json number --jq '.[0].number'
          
          if ($existingIssue) {
            Write-Host "::notice::Existing drift issue #$existingIssue is open. Skipping duplicate creation."
            Add-Content -Path $env:GITHUB_OUTPUT -Value "skip=true"
          } else {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "skip=false"
          }

      - name: Open drift-detection issue
        if: steps.reconcile.outputs.drift == 'true' && steps.check-issue.outputs.skip == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $report = Get-Content drift-report.txt -Raw
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          $issueBody = @"
          ## Summary

          The scheduled drift-detection loop detected differences between the repo's desired-state YAML under ``data-plane/`` and the live tenant behind the ``$($env:ENVIRONMENT_NAME)`` environment.

          This issue was opened automatically by ``.github/workflows/drift-detection.yml``.

          ## Drift report

          $report

          ## Next steps

          1. Review the [workflow run]($runUrl) for full reconciler output.
          2. Decide whether to:
             - Accept the drift back into source (run the matching ``sync-*-from-tenant.yml`` workflow).
             - Overwrite the portal edits (merge a PR that updates the desired-state YAML and re-deploys).
             - Ratify the deviation via an ADR.
          3. Close this issue once drift is resolved.

          ## References

          - [ADR 0029 — Source-of-truth direction policy](https://github.com/contoso/Purview-as-Code-Generic/blob/main/docs/adr/0029-source-of-truth-direction-policy.md)
          "@

          gh issue create `
            --title "Drift detected in the $($env:ENVIRONMENT_NAME) environment tenant" `
            --body $issueBody `
            --label "needs-review,squad:automation-engineer,drift-detected"

          Write-Host "::notice::Drift issue created successfully."

      - name: Restore Key Vault network defaults
        if: always() && steps.kv-open.outputs.opened == 'true'
        shell: pwsh
        run: |
          az keyvault update `
            --name $env:KEY_VAULT_NAME `
            --public-network-access Disabled `
            --default-action Deny `
            --only-show-errors `
            -o none

      - name: Summarize result
        if: always()
        shell: pwsh
        env:
          DRIFT_DETECTED: ${{ steps.reconcile.outputs.drift }}
        run: |
          if ($env:DRIFT_DETECTED -eq 'true') {
            Write-Host "::notice::Drift detected. Review the issue for details."
          } elseif ($env:DRIFT_DETECTED -eq 'false') {
            Write-Host "::notice::No drift detected. Tenant matches desired state."
          } else {
            Write-Host "::warning::Drift detection did not complete (job failed before reconcile step finished)."
          }
