# EXAMPLE — NOT DEPLOYED. Nothing reads this file (ADR 0056).
#
# A worked label-PUBLISHING policy set for
# data-plane/information-protection/label-policies.yaml, which ships `labelPolicies: []`
# in the template. Copy from here deliberately; prefer running
# `./scripts/Deploy-LabelPolicies.ps1 -ExportCurrentState` against your own tenant.
#
# Label policies are a SEPARATE construct from the labels themselves. A label that is not
# published by a policy is invisible to end users. A policy at `mode: Enable` with
# `exchangeLocation: [All]` publishes to EVERY mailbox in the tenant — which is why the
# template ships none of these.
#
# Label references are COMPOSITE KEYS: `<parent>/<displayName>` for a sublabel, bare
# `<displayName>` for a top-level label. They must resolve against
# examples/data-plane/information-protection/labels.yaml (or your own labels.yaml).
#
# Allowed `advancedSettings:` keys (ADR 0015 §3 allowlist, extended by ADR 0030):
#   DefaultLabel, OutlookDefaultLabel, teamworkdefaultlabelid,
#   RequireDowngradeJustification, MandatoryLabelling, HideBarByDefault.
# Any other key is a schema-validation error in Deploy-LabelPolicies.ps1.
#
# `Public` / `General` as the default is deliberate: pre-select the LOWEST classification
# so the smallest-blast-radius default still lets the user opt up.
#
# Learn references (Microsoft, authoritative):
#   https://learn.microsoft.com/en-us/purview/create-sensitivity-labels#publish-sensitivity-labels-by-creating-a-label-policy
#   https://learn.microsoft.com/en-us/purview/sensitivity-labels-office-apps#configure-advanced-settings
#   https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/new-labelpolicy
#   https://learn.microsoft.com/en-us/powershell/module/exchangepowershell/set-labelpolicy

labelPolicies:
  # Baseline policy: publishes the two unencrypted tiers to everyone, with General as the
  # default and a downgrade-justification prompt.
  - name: Contoso baseline sensitivity labels
    mode: Enable
    exchangeLocation:
      - All
    modernGroupLocation: []
    includedAdministrativeUnits: []
    powerBIComplianceInformation: true
    labels:
      - General
      - Public
    advancedSettings:
      DefaultLabel: "General"
      OutlookDefaultLabel: "General"
      RequireDowngradeJustification: "true"
      teamworkdefaultlabelid: "General"

  # Full taxonomy, including the encrypting tiers. Scope this to the population that
  # actually needs it rather than [All] once you have a group to scope to
  # (`exchangeLocationException:` accepts a mail-enabled group identifier verbatim —
  # no Microsoft Graph principal-id resolution needed; see ADR 0015).
  - name: Contoso confidential + highly confidential
    mode: Enable
    exchangeLocation:
      - All
    modernGroupLocation: []
    includedAdministrativeUnits: []
    powerBIComplianceInformation: true
    labels:
      - Confidential
      - Confidential/External
      - Confidential/Internal
      - Confidential/Partner
      - General
      - Highly Confidential
      - Highly Confidential/External (Restricted)
      - Highly Confidential/Internal (Restricted)
      - Highly Confidential/Partner (Restricted)
      - Public
    advancedSettings:
      DefaultLabel: "General"
      OutlookDefaultLabel: "General"
      RequireDowngradeJustification: "true"
      teamworkdefaultlabelid: "General"
