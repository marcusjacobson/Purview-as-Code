# Scans, scan rulesets, and triggers (desired state).
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/scanningdataplane/scans
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/scanningdataplane/scan-rulesets
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/scanningdataplane/triggers
#
# Notes:
# - Each scan binds to an existing data source by `dataSource` (the source `name`
#   from data-plane/data-sources/data-sources.yaml). The reconciler rejects
#   scans whose dataSource is not currently registered in the tenant.
# - `properties.collection.referenceName` must target an existing collection.
# - Scans referencing custom scanRulesets must declare them under `scanRulesets`
#   first. Custom rulesets live alongside the System rulesets Purview ships with.
# - `trigger.recurrence` defines the default recurring trigger. Omit `trigger`
#   to run the scan on-demand only.
#
# TEMPLATE DEFAULT — BOTH ROOT LISTS EMPTY (ADR 0056: the template ships empty
# desired state).
#
# An empty ROOT list is the ONLY shape that is a true no-op. `Deploy-Scans.ps1` builds
# its plan by iterating these lists, so zero entries means zero Create and zero Update
# rows. Delete rows are reachable only under an explicit `-PruneMissing`.
#
# Do NOT restore a "harmless sample" entry here. A populated list in this file is
# DEPLOYABLE DESIRED STATE. This file previously shipped a verbatim export of the owner's
# live lab — 17 scans carrying a real Databricks workspace URL, a real SQL-warehouse
# path, a real Dataverse organization endpoint, the lab's managed-VNet and
# integration-runtime names, and a misspelled scan name (`Scan-DataLakeModerninzation`)
# that no curated sample would ever contain. The typo is the tell: this was an export,
# not authored content.
#
# A worked, fully-scrubbed example lives at:
#   examples/data-plane/scans/scans.yaml
# — under a tree that NO workflow, script, or schema reads. Copy from there deliberately.
#
# To adopt this solution: run `./scripts/Deploy-Scans.ps1 -ExportCurrentState` first
# (mandatory first-run bootstrap), review the drift report in a PR, then merge.
scanRulesets: []

scans: []
