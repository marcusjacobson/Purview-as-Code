# Registered data sources (desired state).
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/scanningdataplane/data-sources
# Reference: https://learn.microsoft.com/en-us/purview/data-map-data-scan-credentials
#
# Notes:
# - `properties.collection.referenceName` must target an existing collection.
# - `properties.credential` holds only Key Vault references (never secret values).
# - For sources that support it, prefer `authType: ManagedIdentity`.
# - Real Azure topology IDs (subscription, tenant) are committed as
#   `${env:AZURE_SUBSCRIPTION_ID}` / `${env:AZURE_TENANT_ID}` per ADR 0023
#   and resolved by scripts/Resolve-EnvTokens.ps1 at apply time.

# TEMPLATE DEFAULT — EMPTY ROOT LIST (ADR 0056: the template ships empty desired state).
#
# An empty ROOT list is the ONLY shape that is a true no-op. `Deploy-DataSources.ps1`
# builds its plan by iterating THIS list, so zero entries means zero Create and zero
# Update rows. Delete rows are reachable only under an explicit `-PruneMissing`.
#
# Do NOT restore a "harmless sample" entry here. A populated list in this file is
# DEPLOYABLE DESIRED STATE: a consumer who clicks "Use this template" and dispatches the
# deploy workflow gets every source registered against THEIR tenant. This file previously
# shipped the owner's live lab topology, including a real Dataverse organization endpoint.
#
# A worked, fully-scrubbed example lives at:
#   examples/data-plane/data-sources/data-sources.yaml
# — under a tree that NO workflow, script, or schema reads. Copy from there deliberately.
#
# To adopt this solution: run `./scripts/Deploy-DataSources.ps1 -ExportCurrentState` first
# (mandatory first-run bootstrap), review the drift report in a PR, then merge.
dataSources: []
