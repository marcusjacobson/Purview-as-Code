# Desired-state business glossary terms.
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/datamapdataplane/glossary
#
# Each term is namespaced by glossary. The default glossary is auto-created by Purview.

glossary: Glossary

# TEMPLATE DEFAULT -- EMPTY ROOT LIST (ADR 0056: the template ships empty desired state).
#
# The three terms this file used to carry (Customer, PII, RevenueRecognition) were
# GENERIC -- they disclosed nothing. They are emptied anyway, and that is the point:
# ADR 0056 Decision 1 makes the rule UNIFORM precisely so that "is this one safe enough
# to ship?" is never asked again. A per-file judgment call is exactly how an enforcing
# tenant-wide SSN auto-labeling policy shipped from this same directory.
#
# `Deploy-Glossary.ps1` builds its plan by iterating THIS list, so zero entries means
# zero Create and zero Update rows. Delete rows require an explicit `-PruneMissing`.
#
# A worked example lives at:
#   examples/data-plane/glossary/glossary.yaml
# -- under a tree that NO workflow, script, or schema reads. Copy from there deliberately.
terms: []
