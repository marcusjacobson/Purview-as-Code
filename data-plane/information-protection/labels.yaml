# Microsoft Purview as-Code — Sensitivity label taxonomy (desired state)
#
# Desired state for the sensitivity label taxonomy in the
# `contoso.onmicrosoft.com` tenant. Sensitivity labels are a tenant-wide
# Microsoft Purview / Microsoft 365 Information Protection construct
# (parent + sublabel hierarchy, content marking, encryption, content
# type scoping). Labels are **not** collection-scoped — they are keyed
# by `displayName` (and after first deploy by the immutable label GUID
# returned by the service).
#
# The reconciler (`scripts/Deploy-Labels.ps1`) consumes this file,
# compares each desired label against the live taxonomy, and performs
# Create / Update / NoChange operations. Orphan labels (live in tenant,
# missing from YAML) are reported and skipped unless `-PruneMissing` is
# specified. Default steady state is the empty list — no-op safe on
# first run.
#
# First-run bootstrap against an existing tenant (REQUIRED):
#   Before the first reconciler `-Apply` run against this file, run:
#       ./scripts/Deploy-Labels.ps1 -ExportCurrentState
#   That switch populates `labels:` with the live taxonomy. Review the
#   resulting diff in a pull request, then merge. Only after that PR
#   lands is it safe to run `-Apply` (or `-Apply -PruneMissing`) —
#   otherwise the reconciler would treat your existing portal-configured
#   labels as drift. This first-run contract is mandatory for every
#   `Deploy-*.ps1` per
#   `.github/instructions/powershell.instructions.md`
#   (section: "First-run-against-an-existing-tenant contract").
#
# Taxonomy shape (4-tier, per issues #217 + #220 + #223):
#   1. Public                                       (lowest sensitivity, leaf)
#   2. General                                      (default / internal-by-default, leaf)
#   3. Confidential
#       - Internal
#       - Partner
#       - External
#   4. Highly Confidential                          (highest sensitivity)
#       - Internal (Restricted)
#       - Partner (Restricted)
#       - External (Restricted)
#
# Tiers 3-4 carry sub-labels. `Public` and `General` are intentionally
# leaves. Public is a leaf because the live `contoso-lab` tenant has no
# existing sub-labels under Public, and Modern Label Scheme refuses
# `New-Label -ParentId` against an existing leaf with
# `InvalidParentLabelInModernLabelSchemeException` until the parent is
# promoted to a label *group* via the Microsoft Purview portal —
# out-of-band of the as-code path. `General` is a leaf because the
# lab''s lowest two tiers (Public + General) don''t need finer-grained
# audience splits; the audience refinement happens at Confidential and
# above (per issue #220 design discussion, 2026-05-13).
#
# Sub-label `displayName` values are globally unique tenant-wide —
# Microsoft Purview does NOT scope `displayName` by parent. Earlier
# drafts of this file used `All Employees` under three different
# parents; the second and third `New-Label` calls silently no-op''d
# server-side, leaving composite-key references in `label-policies.yaml`
# unresolvable. Issue #220 first renamed the two surviving siblings to
# `Employees Only` (Confidential) and `Need to Know` (Highly Confidential).
# Issue #223 standardizes both tiers on the audience triad
# Internal / Partner / External, suffixing the Highly Confidential leaves
# with `(Restricted)` to keep displayName globally unique.
#
# Auto-apply rules (`autoApplicationOf` in IPPS) for the two
# audience-restricted sublabels (`Confidential / Partner` and
# `Highly Confidential / External (Restricted)`) live in the Microsoft
# Purview portal only and are intentionally NOT expressed in this YAML.
# Per ADR 0027 (`docs/adr/0027-autoapplication-removal-watch-list.md`),
# `scripts/Deploy-Labels.ps1` emits a `NeedsPortalAction` plan row for
# these labels rather than a misleading `Update` — the round-trip path
# is on the watch-list until Microsoft documents a `Set-Label -Conditions`
# clearing sentinel (§8 Q14 of `docs/project-plan.md`). See
# `data-plane/classifications/sit-catalog.yaml` for the public,
# synthetic-safe Credit Card Number SIT GUID those portal-managed rules
# reference.
#
# Design decision recorded in issue #217 thread (2026-05-13): the lab
# stays on the flat parent/sub-label shape and does NOT adopt Microsoft
# Purview label *groups*. Rationale: `contoso-lab` has no label groups
# today, two levels of nesting already satisfies the 4-tier intent, and
# adding groups would require new cmdlets, schema rework, and its own
# ADR + PR — out of scope for this stress-test item.
#
# Out of scope for this file:
#   - Label POLICIES (publishing labels to users / scopes) — that is
#     `data-plane/information-protection/label-policies.yaml` (#66).
#     The label-policies file becomes temporarily out-of-sync with this
#     taxonomy on merge (the `Internal` parent is renamed to `General`)
#     and will be reconciled in stress-test item 2
#     (`feat/info-prot-label-policy-rewrite`).
#   - Auto-labeling policies — that is `auto-label-policies.yaml` (#67).
#   - Draft-07 JSON schema — that is `*.schema.json` (#68).
#   - Full Export-path emit for `autoApplicationOf.mode` / `policyTip` —
#     tracked in issue #215.
#
# Learn references (Microsoft, authoritative):
#   https://learn.microsoft.com/en-us/purview/sensitivity-labels
#   https://learn.microsoft.com/en-us/purview/get-started-with-sensitivity-labels
#   https://learn.microsoft.com/en-us/purview/encryption-sensitivity-labels
#   https://learn.microsoft.com/en-us/purview/sensitivity-labels-office-apps
#   https://learn.microsoft.com/en-us/powershell/module/exchange/new-label
#   https://learn.microsoft.com/en-us/powershell/module/exchange/set-label
#   https://learn.microsoft.com/en-us/powershell/module/exchange/get-label
#   https://learn.microsoft.com/en-us/powershell/module/exchange/remove-label
#   https://learn.microsoft.com/en-us/powershell/exchange/connect-to-scc-powershell
#   https://learn.microsoft.com/en-us/powershell/exchange/app-only-auth-powershell-v2
#
# Fields per entry:
#   displayName   (required, string) Human-visible label name. Must be
#                 unique per parent. Match key in this YAML and against
#                 `Get-Label | ? DisplayName`.
#   parent        (optional, string) DisplayName of the parent label.
#                 Omit (or set to null) for top-level (parent) labels.
#                 The reconciler resolves the parent's GUID at apply
#                 time and passes it to `New-Label -ParentId`.
#   tooltip       (required, string) Short hover text shown to users.
#                 ≤ 280 characters per Office client constraints.
#   comment       (optional, string) Admin-facing note. Not visible to
#                 end users.
#   contentType   (optional, list)   Object kinds the label can be
#                 applied to. Allowed values per New-Label docs:
#                 File, Email, Site, UnifiedGroup, PurviewAssets,
#                 SchematizedData. Default is [File, Email].
#   contentMarking (optional, map)   Header / footer / watermark.
#                 Each sub-block (header/footer/watermark) carries
#                 `enabled`, `text`, `fontSize`, `fontColor`
#                 (#RRGGBB), and an alignment / layout field.
#   encryption    (optional, map)    Rights Management protection.
#                 Only valid on sublabels in this taxonomy. Fields:
#                 `enabled`, `protectionType` (Template / UserDefined /
#                 RemoveProtection), `contentExpiredOnDateInDaysOrNever`
#                 ("Never" or integer days), `offlineAccessDays`
#                 (integer, -1 = always), `doNotForward` (bool),
#                 `encryptOnly` (bool), `rightsDefinitions`
#                 (list of `{ identity, rights }` where `rights` is a
#                 comma-separated string of MIP usage rights).
#
# Sample-data rule (`.github/instructions/sample-data.instructions.md`):
#   - Every email / domain / display name in this file must be
#     synthetic. Use `contoso.com`, `fabrikam.com`, or `example.com`.
#     No real organization / tenant identifiers.
#   - Watermark text and footer text describe the **concept** of the
#     label, not real policy text from a real organization.
#
# Authentication note:
#   The reconciler authenticates via `Connect-IPPSSession -AccessToken`
#   with the Key Vault-signed JWT supplied by
#   `scripts/Get-PurviewIPPSAccessToken.ps1`. Runtime, invocation
#   shape, and session-reuse rules are mandated in
#   `.github/instructions/powershell.instructions.md`
#   (section: "Runtime: pwsh 7.4+ only, and the Connect-IPPSSession
#   auth constraint").

# TEMPLATE DEFAULT -- EMPTY ROOT LIST (ADR 0056: the template ships empty desired state).
#
# An empty ROOT list is the ONLY shape that is a true no-op. `Deploy-Labels.ps1`
# short-circuits on it (line ~1542, `if ($desiredHashes.Count -eq 0) { return @() }`)
# BEFORE the first `Get-Label`, and plans zero Create / Update / Delete rows.
#
# Do NOT restore a "harmless sample" entry here. A populated list in this file is
# DEPLOYABLE DESIRED STATE: labels are TENANT-WIDE and several of them ENCRYPT content.
# This file previously shipped 13 labels exported from the owner's live lab, including
# three `Pilot -- ... (Lab)` fixtures whose own comments read "Remove during lab teardown"
# and which named a real Entra security group as a rights holder. Those are DELETED, not
# preserved: a teardown artifact has no value as an example.
#
# NOTE -- the SIT catalog is UNAFFECTED and stays populated.
# `data-plane/classifications/sit-catalog.yaml` is a Microsoft built-in REFERENCE catalog,
# not desired state; no script creates, updates, or prunes a SIT. `Deploy-Labels.ps1`
# (line ~1262) ERRORS and returns if a label's `autoApplicationOf.sitId` is absent from
# it, so emptying the catalog would break every label deploy that uses auto-application.
# ADR 0056 Decision 3 carves it out BY NAME, WITH THAT REASON.
#
# A worked, fully-scrubbed example lives at:
#   examples/data-plane/information-protection/labels.yaml
# -- under a tree that NO workflow, script, or schema reads. Copy from there deliberately.
#
# To adopt this solution: run `./scripts/Deploy-Labels.ps1 -ExportCurrentState` first
# (mandatory first-run bootstrap), review the drift report in a PR, then merge.
