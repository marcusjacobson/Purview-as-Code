# Desired-state collection hierarchy.
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/accountdataplane/collections
#
# The root collection shares the name of the Purview account and is managed by Azure.
# Children listed here are created/updated under it. Removing an entry DOES NOT delete
# the collection (deletion is opt-in; see scripts/Deploy-Collections.ps1 -PruneMissing).
#
# TEMPLATE DEFAULT — EMPTY ROOT LIST (ADR 0056). See the block above `collections:`.

# rootCollection — the Purview ACCOUNT NAME, not desired state.
#
# Ships UNSET (null). It is a tenant identifier, and with `collections: []` there is
# nothing to root, so a shipped value would be pure disclosure with zero function:
# `Deploy-Collections.ps1` treats this key as optional and INFORMATIONAL (line ~852) and
# always binds the account from `-PurviewAccountName` / `infra/parameters/lab.yaml`, the
# single source of truth (ADR 0046). When present it is a copy-paste guard: the
# reconciler errors if it disagrees with the target account.
#
# A spin-off that POPULATES `collections:` below should set this to its own account name
# to re-arm that guard. The template cannot: it has no account. (ADR 0056 Decision 5.)
rootCollection: null

# Optional allow-list of tenant collections that must NEVER be deleted by
# `-PruneMissing`. Use this for system-managed or service-created collections
# that return `HTTP 400 code 1006 -- "<name> can't be deleted with this API."`
# (see PR #307 Cycle 3 for the original failure mode). Names match
# case-insensitively against the `name` (URL segment) field. Default: empty.
# Reference: https://learn.microsoft.com/en-us/rest/api/purview/accountdataplane/collections/delete-collection
protected: []

# TEMPLATE DEFAULT — EMPTY ROOT LIST (ADR 0056: the template ships empty desired state).
#
# An empty ROOT list is the ONLY shape that is a true no-op. `Deploy-Collections.ps1`
# builds its plan by iterating THIS list (`ConvertTo-DesiredCollectionList` returns `@()`
# when it is empty), so zero entries means zero Create and zero Update rows. Delete rows
# are reachable only under an explicit `-PruneMissing`.
#
# Do NOT restore a "harmless sample" entry here. A populated list in this file is
# DEPLOYABLE DESIRED STATE: a consumer who clicks "Use this template" and dispatches the
# deploy workflow gets every entry created in THEIR tenant. This file previously shipped
# the owner's live lab hierarchy — including Purview's auto-generated 6-character
# collection IDs (`c8iacz`, `chfb1r`, …), which nobody hand-authors and which are useless
# to anyone else.
#
# A worked, fully-scrubbed example lives at:
#   examples/data-plane/collections/collections.yaml
# — under a tree that NO workflow, script, or schema reads. Copy from there deliberately.
#
# To adopt this solution: run `./scripts/Deploy-Collections.ps1 -ExportCurrentState` first
# (mandatory first-run bootstrap), review the drift report in a PR, then merge.
collections: []
